<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Di ngủ ngon 🌙</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root{
    --night-deep:#3b2340;
    --night-mid:#6b3a5c;
    --night-glow:#e8a3c4;
    --cream:#fff6f0;
    --rose-deep:#c2427d;
    --rose-mid:#e8899f;
    --blush:#f7c9d9;
    --gold:#e9c99a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    overflow-x:hidden;
    background: radial-gradient(ellipse at 50% -10%, var(--night-glow) 0%, var(--night-mid) 38%, var(--night-deep) 78%);
    font-family:'Cormorant Garamond', serif;
    color:var(--cream);
  }
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:32px 20px;
  }

  /* Stars */
  .stars{position:fixed; inset:0; z-index:0; pointer-events:none;}
  .star{
    position:absolute;
    width:2px;height:2px;
    background:var(--cream);
    border-radius:50%;
    opacity:.6;
    animation: twinkle 3.2s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:.15; transform:scale(1);}
    50%{opacity:.9; transform:scale(1.6);}
  }

  /* Moon */
  .moon{
    position:absolute;
    top:6%;
    left:50%;
    transform:translateX(-50%);
    width:64px;height:64px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 32%, #fffdf6 0%, var(--gold) 55%, #d8ab74 100%);
    box-shadow: 0 0 40px 12px rgba(233,201,154,.45), 0 0 90px 30px rgba(233,201,154,.18);
    animation: floatMoon 7s ease-in-out infinite;
    z-index:1;
  }
  @keyframes floatMoon{
    0%,100%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(-10px);}
  }

  /* Falling petals */
  .petals{position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden;}
  .petal{
    position:absolute;
    top:-5%;
    width:14px;height:14px;
    background: radial-gradient(circle at 30% 30%, var(--blush), var(--rose-mid) 70%);
    border-radius: 60% 0 60% 0;
    opacity:.85;
    animation-name: fall, sway;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
  }
  @keyframes fall{
    to{ transform: translateY(115vh) rotate(360deg); }
  }
  @keyframes sway{
    0%,100%{ margin-left:-18px; }
    50%{ margin-left:18px; }
  }

  /* Main card */
  .scene{
    position:relative;
    z-index:2;
    width:100%;
    max-width:560px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:6px;
  }

  .eyebrow{
    font-size:.85rem;
    letter-spacing:.35em;
    text-transform:uppercase;
    color:var(--blush);
    opacity:0;
    animation: riseIn 1s ease forwards;
    animation-delay:.2s;
  }

  /* Blooming rose */
  .rose-wrap{
    width:150px;
    height:150px;
    margin:10px 0 2px;
    opacity:0;
    animation: riseIn 1.1s ease forwards;
    animation-delay:3.7s;
  }
  .petal-g{
    transform-origin: 100px 118px;
    transform: scale(0.15) rotate(-8deg);
    animation: bloom 2.6s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .petal-g:nth-child(1){ animation-delay:3.9s; }
  .petal-g:nth-child(2){ animation-delay:4.05s; }
  .petal-g:nth-child(3){ animation-delay:4.2s; }
  .petal-g:nth-child(4){ animation-delay:4.35s; }
  .petal-g:nth-child(5){ animation-delay:4.5s; }
  .petal-g:nth-child(6){ animation-delay:4.65s; }
  @keyframes bloom{
    0%{ transform: scale(0.15) rotate(-8deg); opacity:0; }
    55%{ opacity:1; }
    100%{ transform: scale(1) rotate(0deg); opacity:1; }
  }
  .rose-glow{
    animation: glowPulse 3.5s ease-in-out infinite;
    animation-delay: 5.4s;
  }
  @keyframes glowPulse{
    0%,100%{ opacity:.35; }
    50%{ opacity:.7; }
  }

  h1{
    font-family:'Great Vibes', cursive;
    font-weight:400;
    font-size:clamp(2.6rem, 9vw, 4rem);
    color:var(--cream);
    line-height:1;
    opacity:0;
    animation: riseIn 1s ease forwards;
    animation-delay:1.9s;
    text-shadow: 0 0 24px rgba(232,163,196,.4);
  }

  .subtitle{
    font-size:1.05rem;
    font-style:italic;
    color:var(--blush);
    margin-top:6px;
    opacity:0;
    animation: riseIn 1s ease forwards;
    animation-delay:2.15s;
  }

  .divider{
    width:1px;
    height:30px;
    background: linear-gradient(var(--blush), transparent);
    margin:22px 0;
    opacity:0;
    animation: riseIn 1s ease forwards;
    animation-delay:2.4s;
  }

  .message{
    font-size:clamp(1.05rem, 3.2vw, 1.25rem);
    line-height:1.85;
    color:#fdeef4;
    max-width:460px;
    font-weight:400;
  }
  .message p{
    opacity:0;
    animation: riseIn .9s ease forwards;
  }
  .message p:nth-child(1){ animation-delay:2.6s; }
  .message p:nth-child(2){ animation-delay:3.05s; }
  .message p:nth-child(3){ animation-delay:3.5s; }

  .signature{
    margin-top:14px;
    font-family:'Great Vibes', cursive;
    font-size:1.6rem;
    color:var(--gold);
    opacity:0;
    animation: riseIn 1s ease forwards;
    animation-delay:5.6s;
  }

  .stars-icon{
    margin-top:14px;
    display:flex;
    gap:10px;
    opacity:0;
    animation: riseIn 1s ease forwards;
    animation-delay:5.8s;
  }
  .stars-icon span{
    font-size:.9rem;
    color:var(--blush);
    animation: twinkle 2.4s ease-in-out infinite;
  }
  .stars-icon span:nth-child(2){ animation-delay:.4s; }
  .stars-icon span:nth-child(3){ animation-delay:.8s; }

  @keyframes riseIn{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; }
  }

  @media (max-width:420px){
    .moon{ width:48px; height:48px; top:4%; }
    .rose-wrap{ width:120px; height:120px; }
  }
</style>
</head>
<body>

  <div class="stars" id="stars"></div>
  <div class="petals" id="petals"></div>
  <div class="moon"></div>

  <main class="scene">
    <div class="eyebrow">gửi Di</div>

    <h1>Thế giới của tui</h1>
    <div class="subtitle"></div>

    <div class="divider"></div>

    <div class="message">
      <p>Một ngày dài đã khép lại rồi.</p>
      <p></p>
      <p>Chúc Di ngủ thật ngon, không gặp ác mộng, mơ những giấc mơ đẹp, và mai thức dậy vẫn thấy đời dịu dàng như đóa hoa này. 🌸</p>
    </div>

    <div class="rose-wrap">
      <svg viewBox="0 0 200 220" width="100%" height="100%">
        <defs>
          <radialGradient id="petalGrad" cx="35%" cy="30%" r="75%">
            <stop offset="0%" stop-color="#ffe3ee"/>
            <stop offset="55%" stop-color="#f0a6c4"/>
            <stop offset="100%" stop-color="#c2427d"/>
          </radialGradient>
          <linearGradient id="stemGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#7fae7a"/>
            <stop offset="100%" stop-color="#4d7a52"/>
          </linearGradient>
          <radialGradient id="glowGrad" cx="50%" cy="45%" r="60%">
            <stop offset="0%" stop-color="#f7c9d9" stop-opacity=".55"/>
            <stop offset="100%" stop-color="#f7c9d9" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <circle class="rose-glow" cx="100" cy="95" r="70" fill="url(#glowGrad)"/>

        <!-- stem -->
        <path d="M100 140 C 96 165, 104 185, 98 208" stroke="url(#stemGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M99 165 C 108 168, 116 176, 118 186" stroke="url(#stemGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="119" cy="188" rx="10" ry="5" fill="#5f9161" transform="rotate(30 119 188)"/>

        <!-- outer petals -->
        <g class="petal-g">
          <path d="M100 95 C 60 85, 55 45, 90 30 C 100 55, 100 75, 100 95 Z" fill="url(#petalGrad)"/>
        </g>
        <g class="petal-g">
          <path d="M100 95 C 140 85, 145 45, 110 30 C 100 55, 100 75, 100 95 Z" fill="url(#petalGrad)"/>
        </g>
        <g class="petal-g">
          <path d="M100 95 C 58 100, 48 65, 70 40 C 85 60, 95 78, 100 95 Z" fill="url(#petalGrad)" opacity=".95"/>
        </g>
        <g class="petal-g">
          <path d="M100 95 C 142 100, 152 65, 130 40 C 115 60, 105 78, 100 95 Z" fill="url(#petalGrad)" opacity=".95"/>
        </g>
        <!-- inner petals -->
        <g class="petal-g">
          <path d="M100 100 C 78 92, 74 68, 92 55 C 98 70, 100 86, 100 100 Z" fill="#f6b9d2"/>
        </g>
        <g class="petal-g">
          <path d="M100 100 C 122 92, 126 68, 108 55 C 102 70, 100 86, 100 100 Z" fill="#f6b9d2"/>
        </g>
      </svg>
    </div>

    <div class="signature">Di ơi, ngủ ngon nhé.</div>
    <div class="stars-icon"><span>✦</span><span>✦</span><span>✦</span></div>
  </main>

<script>
  // generate stars
  const starsEl = document.getElementById('stars');
  const starCount = window.innerWidth < 480 ? 45 : 80;
  for(let i=0;i<starCount;i++){
    const s = document.createElement('div');
    s.className='star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*70+'%';
    s.style.animationDelay = (Math.random()*3)+'s';
    s.style.animationDuration = (2.4+Math.random()*2.4)+'s';
    starsEl.appendChild(s);
  }

  // generate falling petals
  const petalsEl = document.getElementById('petals');
  const petalCount = window.innerWidth < 480 ? 10 : 16;
  for(let i=0;i<petalCount;i++){
    const p = document.createElement('div');
    p.className='petal';
    const left = Math.random()*100;
    const fallDur = 9 + Math.random()*8;
    const swayDur = 2.5 + Math.random()*2;
    const delay = Math.random()*10;
    const scale = 0.6 + Math.random()*0.9;
    p.style.left = left+'%';
    p.style.transform = `scale(${scale})`;
    p.style.animationDuration = `${fallDur}s, ${swayDur}s`;
    p.style.animationDelay = `${delay}s, ${delay}s`;
    petalsEl.appendChild(p);
  }
</script>
</body>
</html>
